<h4>WLAN & IP Manager</h4>
<hr />

<center>

<input class="nanohome" id="ssid" requiredminlength="4" value="WLAN SSID" placeholder="WLAN SSID" onfocus="this.value=''" onfocusout="if (this.value === '') { this.value = this.defaultValue; }" autocomplete="off" />

</p>

<input class="nanohome" type="password" id="psk" requiredminlength="8" value="WPA Key" placeholder="WPA Key" onfocus="this.value=''" onfocusout="if (this.value === '') { this.value = this.defaultValue; }" autocomplete="off" />

</p>

<font size="3" style="text-align: center;">Optional fixe IP-Adresse</font>

</p>

<input class="nanohome" id="ip" requiredminlength="8" value="IP Adresse" placeholder="IP Adresse" onfocus="this.value=''" onfocusout="if (this.value === '') { this.value = this.defaultValue; }" autocomplete="off" />

</p>

<input class="nanohome" id="gateway" requiredminlength="8" value="Gateway" placeholder="Gateway" onfocus="this.value=''" onfocusout="if (this.value === '') { this.value = this.defaultValue; }" autocomplete="off" />

</p>

<input class="nanohome" id="dnsserver" requiredminlength="8" value="DNS Server" placeholder="DNS Server" onfocus="this.value=''" onfocusout="if (this.value === '') { this.value = this.defaultValue; }" autocomplete="off" />

</p>

<button title="Zeige Einstellungen" class="form" style="background-color: #fff4bd;" onclick="wifimgmt('show');">🔎</button>
<button title="WLAN speichern & IP setzen" class="form" style="background-color: #adfc95;" onclick="wifimgmt('add');">💾</button>
<button title="Alle bekannten WLAN löschen" class="form" style="background-color: #ffbdbd;" onclick="wifimgmt('delete');">❌</button>
<button title="Passwort zeigen" class="form" style="background-color: #fff4bd;" onclick="show_key()">🔑</button>

</p>

</center>

<script>
    function wifimgmt(param) {
	
        var ssid_input = document.getElementById("ssid").value;
        var psk_input = document.getElementById("psk").value;
        var ip_input = document.getElementById("ip").value;
        var gateway_input = document.getElementById("gateway").value;
        var dns_input = document.getElementById("dnsserver").value;
		
        var wcon = "wcon '" + param + "' '" + ssid_input + "' '" + psk_input + "' '" + ip_input + "' '" + gateway_input + "' '" + dns_input + "'";

        publish_settings(wcon);
    };

    function show_key() {
        var x = document.getElementById("psk");
        if (x.type === "password") {
            x.type = "text";
        } else {
            x.type = "password";
        }
    }
</script>
