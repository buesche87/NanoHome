<div><center><h4>Schaltuhr</h4></center></div>
<hr>

<div>
<center>
<br>
<select id="device" style="width: 166px; font-size:18px; text-align-last: center; background-color: #fff4bd" name="nanolist">

  <option value="shelly1pm-76DAD6">TV</option>
  <option value="sonoff_3">Büro</option>
  <option value="sonoff_1">TV Deko</option>
  <option value="shelly1pm-E641C5">Sideboard</option>
  <option value="shelly1pm-766A83">Sofa</option>
  <option value="shelly1pm-8CAAB5056FE7">Joris</option>
  <option value="all">Alle</option>
</select>
<br><p>
<table>
<tr>
<td><font size=4>Ein</font></td>
<td><input type="text" id="ein" name="ein" maxlength="5" style="width: 80px; text-align:center; font-size:18px; background-color: #c7e9ff" value="08:00"</input></td>
</tr>
<td><font size=4>Aus</font></td>
<td><input type="text" id="aus" name="aus" maxlength="5" style="width: 80px; text-align:center; font-size:18px; background-color: #c7e9ff" value="22:00"</input></td>
</tr>
</table>
<br>
<select name="day" id="day" style="width: 166px; font-size:18px; text-align-last: center; background-color: #c7e9ff">
  <option value="*">Täglich</option>
  <option value="1">Montag</option>
  <option value="2">Dienstag</option>
  <option value="3">Mittwoch</option>
  <option value="4">Donnerstag</option>
  <option value="5">Freitag</option>
  <option value="6">Samstag</option>
  <option value="0">Sonntag</option>
  <option value="6-7">Wochenende</option>
  <option value="1-5">Werktags</option>
</select>
<br><p>
<br>
  <button style="width: 100px; height: 35px; background-color: #c7e9ff" type="button" onclick="add_zsp()"><font size="3">Senden</font></button>
  <button style="width: 100px; height: 35px; background-color: #fff4bd" type="button" onclick="show_zsp()"><font size="3">Auslesen</font></button>
  <button style="width: 100px; height: 35px; background-color: #ffbdbd" type="button" onclick="delete_zsp()"><font size="3">Löschen</font></button>
</center>
</div>

<script>
    
    function ShowDivZSP() {
      document.getElementById("div_zsp").style.display = "";
    }
    
    mqtt.onMessageArrived = message_inbound;

    function message_inbound(zsp_message) {
        var zsp_output = zsp_message.payloadString;
        $('#req_zsp_output').html(zsp_output);
    };
    
    var add_zsp = function () {
		
		var zsp_dev = document.getElementById("device").value;
        var zsp_tag = document.getElementById("day").value;
        var zsp_ein = document.getElementById("ein").value;
        var zsp_aus = document.getElementById("aus").value;
        var addcron = "cronman add '" + zsp_dev + "' '" + zsp_tag + "' " + zsp_ein + " " + zsp_aus;
        
        publish_zsp(addcron); 
    }

    var show_zsp = function () {
		
		var zsp_dev = document.getElementById("device").value;
		var showcron = "cronman show " + zsp_dev;
		
        publish_zsp(showcron); 
    }

    var delete_zsp = function () {

		var zsp_dev = document.getElementById("device").value;
        var delcron = "cronman remove " + zsp_dev;
		
        publish_zsp(delcron); 
    }

      var publish_zsp = function (zsp_payload) {
      mqtt.subscribe("output", {
		  qos: 2
	    });
	
	    console.log('Sending: ' + JSON.stringify(zsp_payload));
    
	    var zsp_message = new Paho.MQTT.Message(zsp_payload);
		      zsp_message.destinationName = "input";
		      zsp_message.qos = 2;

	    mqtt.send(zsp_message);
	    
	    setTimeout(() => { mqtt.unsubscribe("output"); }, 5000);
	
	  };


</script>
