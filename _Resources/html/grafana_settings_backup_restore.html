<center>

<script>

	function backuprestore(param) {

        var input_payload = "<font size='5' color='hotpink'>Wird ausgeführt</font><br><br><font size='4'>Bitte warten...</font>";
        $("#settings_output").html(input_payload);
	
        var grafana = document.getElementById("grafana").checked;
        var influxdb = document.getElementById("influxdb").checked;
        var wifi = document.getElementById("wifi").checked;

		var cmnd = "nanobackup " + param + " " + grafana + " " + influxdb + " " + wifi ;
		
		publish_settings(cmnd);
	
	}

</script>
