<h3>Standbykiller</h3>
<hr />

<center>

<select class="nanohome" id="stby_device"onchange="standbykill('show')" name="nanolist_stbykill">
</select>

</p>

<table align="center" style="width:100%">
    <tr>
        <td align="right" style="width:50%"><font size="4">Standby [W]</font></td>
        <td align="left" style="width:50%"><input class="nanohome_blue" style="width:50%" id="stbypwr" maxlength="5" value="20" /></td>
    </tr>
</table>

</p>

<button title="Aktivieren" class="nanohome_add" onclick="standbykill('add')">💾</button>
<button title="Alle Anzeigen" class="nanohome_show" onclick="standbykill('show all')">🔎</button>
<button title="Deaktivieren" class="nanohome_remove" onclick="standbykill('remove')">❌</button>

</center>

<script>

    function standbykill(param) {
	
        var stby_dev = document.getElementById("stby_device").value;
        var stby_pwr = document.getElementById("stbypwr").value;
		
        var stdby_kill = "standbykiller " + param + " '" + stby_dev + "' '" + stby_pwr + "'";

        publish_timer(stdby_kill);
        
	};

</script>
