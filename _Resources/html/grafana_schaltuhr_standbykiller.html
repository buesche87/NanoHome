<div>
    <h3>Standbykiller</h3>
    <hr />
</div>

<div>
    <table align="center" style="width:100%">
        <tr>
            <td colspan="2">
                <select class="nanohome" id="stby_device"onchange="standbykill('show')" name="nanolist_stbykill">
                    <option value="shelly1pm-8CAAB505F81D">Schlafzimmer</option>
                    <option value="shelly1pm-76DAD6">TV</option>
                    <option value="sonoff_3">Büro</option>
                    <option value="sonoff_1">Wohnzimmer</option>
                    <option value="shelly1pm-E641C5">Sideboard</option>
                    <option value="shelly1pm-766A83">Sofa</option>
                    <option value="shelly1pm-8CAAB5056FE7">Joris</option>
                </select>
            </td>
        </tr>
        <tr>
            <td align="right"><font size="4">Standby [W]</font></td>
            <td align="left" style="width:40%"><input class="nanohome" id="stbypwr" maxlength="5" value="20" /></td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <button class="nanohome" style="width: 30%; background-color: #c0fcb1;" onclick="standbykill('add')">💾</button>
                <button class="nanohome" style="width: 30%; background-color: #fff4bd;" onclick="standbykill('show all')">🔎</button>
                <button class="nanohome" style="width: 30%; background-color: #ffbdbd;" onclick="standbykill('remove')">❌</button>
            </td>
        </tr>
    </table>
</div>

<script>

    function standbykill(param) {
	
        var stby_dev = document.getElementById("stby_device").value;
        var stby_pwr = document.getElementById("stbypwr").value;
		
        var stdby_kill = "standbykiller " + param + " '" + stby_dev + "' '" + stby_pwr + "'";

        publish_timer(stdby_kill);
        
	};

</script>
