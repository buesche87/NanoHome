<div>
    <h4>System Input</h4>
    <hr />
</div>

<div>
<input title="Linux Befehle ausführen" class="nanohome" type="text" id="input" value="Input" onfocus="this.value=''" onfocusout="if (this.value === '') { this.value = this.defaultValue; }" autocomplete="off"/>
</div>

<script>
$("input").on("keydown",function search(e) {
    if(e.keyCode == 13) {
      
        var inp = document.getElementById("input").value;
        
        if (inp != "") {
            publish_settings(inp);
          } else {
            publish_settings("nanohelp");
          }
    }
});
</script>
