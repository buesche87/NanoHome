<div><h5>Input</h5></div>

<div>
	<hr>
	<table style="width:100%;">
  <tbody>
  <tr>
    <td><input type="text" id="input" name="input" style="width:100%" value="Input"</input></td>
    <td><button type="button" style="background-color: #ffbdbd" onclick="input_message()"><font size="4">Senden</font></button></td>
  </tr>
  </tbody>
  </table>
</div>

<div>
  <hr>
	<div><span id="full_output" style="text-align: left; white-space: pre; font-family: monospace; display: inline-block; unicode-bidi: embed">#</span></div>
</div>

<script>

    var input_message = function () {
        var inp = document.getElementById("input").value;
        
        publish_settings(inp);
        
    };
        
    var publish_settings = function (settings_payload) {
      mqtt.subscribe("output", {
		  qos: 2
	    });
	
	    console.log('Sending: ' + JSON.stringify(settings_payload));
    
	    var settings_message = new Paho.MQTT.Message(settings_payload);
		      settings_message.destinationName = "input";
		      settings_message.qos = 2;

	    mqtt.send(settings_message);
	    
	    setTimeout(() => { mqtt.unsubscribe("output"); }, 300000);
	
	  };

    mqtt.onMessageArrived = message_inbound;

    function message_inbound(message) {
        var input_payload = message.payloadString;
        $('#full_output').html(input_payload);
    };

</script>

.container {

.checkmark:after {
