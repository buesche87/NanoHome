<div>
    <h4>System Update</h4>
    <hr />
</div>

<div>
    <table style="text-align: center; margin-left: auto; margin-right: auto;">
        <tr>
            <td>
                <button title="Nach Systemupdates suchen" class="nanohome" style="background-color: #fff4bd;" onclick="checkupdate()">🔎</button>
                <button class="nanohome" style="background-color: #adfc95;" onclick="doupdate()">Update</button>
            </td>
        </tr>
        <tr>
            <td>
                <font size="3" style="text-align: center;">Für Recovery SD einlegen</font>
            </td>
        </tr>
        <tr>
            <td>
                <button class="nanohome" style="background-color: #ffbdbd;" onclick="reboot()">Reboot</button>
            </td>
        </tr>
    </table>
</div>

<script>
    function checkupdate() {
        var input_payload = "<font size=5 color='hotpink'>Prüfe auf Systemupdates</font><p><br>Bitte warten...";
        $("#settings_output").html(input_payload);

        var cmnd = "apt-get -u upgrade --assume-no";

        publish_settings(cmnd);
    }

    function doupdate() {
        var input_payload = "<font size=5 color='hotpink'>Installiere Systemupdates</font><p><br>Bitte warten... (Das kann dauern)";
        $("#settings_output").html(input_payload);

        var cmnd = "apt-get -y upgrade";

        publish_settings(cmnd);
    }

    function reboot() {
        var input_payload = "<font size=5 color='hotpink'>Reboot</font><p><br>Die Seite wird in 3 Minuten neu geladen";
        $("#settings_output").html(input_payload);

        var cmnd = "reboot now";

        publish_settings(cmnd);

        setTimeout(() => {
            window.location.reload(true);
        }, 30000);
    }

    function recovery() {
        var input_payload = "<font size=5 color='hotpink'>Reboot ins Recovery</font><p><br>Recovery-SD einlegen...<br>Die Seite wird in 3 Minuten neu geladen";
        $("#settings_output").html(input_payload);

        var cmnd = "reboot now";

        publish_settings(cmnd);

        setTimeout(() => {
            window.open("http://nanohome.nano.lan");
        }, 30000);
    }
</script>
