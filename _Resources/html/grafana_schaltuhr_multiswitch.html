<div>
    <h3>Multiswitch</h3>
    <hr />
</div>

<div>
    <table>
        <tr>
            <td colspan="3">
                <select class="nanohome" id="multi_dev1" onchange="multiswitch('show')" style="background-color: #fff4bd;" name="nanolist_multiswitch">
                    <option selected disabled>Wenn...</option>
                    <option value="shelly1pm-8CAAB505F81D">Schlafzimmer</option>
                    <option value="shelly1pm-76DAD6">TV</option>
                    <option value="sonoff_3">Büro</option>
                    <option value="sonoff_1">Wohnzimmer</option>
                    <option value="shelly1pm-E641C5">Sideboard</option>
                    <option value="shelly1pm-766A83">Sofa</option>
                    <option value="shelly1pm-8CAAB5056FE7">Joris</option>
                    <option value="shellyswitch25-BCDDC277633D">Rollo Links</option>
                    <option value="shellyswitch25-BCDDC2776459">Rollo Rechts</option>
                </select>
            </td>
            <tr>
            </tr>
            <td colspan="3">
                <select class="nanohome" id="multi_value1" onchange="multiswitch('show')" style="background-color: #c7e9ff;">
                    <option value="on">Ein</option>
                    <option value="off">Aus</option>
                    <option value="on">Auf</option>
                    <option value="off">Zu</option>
                </select>
            </td>
        </tr>
        <tr>
            <td colspan="3">
                <select class="nanohome" id="multi_dev2" onchange="multiswitch('show')" style="background-color: #fff4bd;" name="nanolist">
                    <option selected disabled>Dann...</option>
                    <option value="shelly1pm-8CAAB505F81D">Schlafzimmer</option>
                    <option value="shelly1pm-76DAD6">TV</option>
                    <option value="sonoff_3">Büro</option>
                    <option value="sonoff_1">Wohnzimmer</option>
                    <option value="shelly1pm-E641C5">Sideboard</option>
                    <option value="shelly1pm-766A83">Sofa</option>
                    <option value="shelly1pm-8CAAB5056FE7">Joris</option>
                    <option value="shellyswitch25-BCDDC277633D">Rollo Links</option>
                    <option value="shellyswitch25-BCDDC2776459">Rollo Rechts</option>
                </select>
            </td>
            </tr>
            <tr>
            <td colspan="3">
                <select class="nanohome" id="multi_value2" onchange="multiswitch('show')" style="background-color: #c7e9ff;">
                    <option value="on">Ein</option>
                    <option value="off">Aus</option>
                    <option value="on">Auf</option>
                    <option value="off">Zu</option>
                </select>
            </td>
        </tr>
        <tr>
            <td colspan="3">
                <select class="nanohome" id="multi_day" onchange="show_time()" style="background-color: #c7e9ff;">
                    <option selected disabled>Aktiv...</option>
                    <option value="always">Immer</option>
                    <option value="*">Täglich</option>
                    <option value="1">Montag</option>
                    <option value="2">Dienstag</option>
                    <option value="3">Mittwoch</option>
                    <option value="4">Donnerstag</option>
                    <option value="5">Freitag</option>
                    <option value="6">Samstag</option>
                    <option value="0">Sonntag</option>
                    <option value="6-7">Wochenende</option>
                    <option value="1-5">Werktags</option>
                </select>
            </td>
        </tr>
        <tr align="center">
            <td style="width:48%">
                <input class="nanohome" id="multi_on" pattern=".{5,5}" value="-" onfocus="this.value=''" onfocusout="if (this.value === '') { this.value = this.defaultValue; }" autocomplete="off" />
            </td>
            <td>
                <font size="4">-</font>
            </td>
            <td style="width:48%">
                <input class="nanohome" id="multi_off" pattern=".{5,5}" value="-" onfocus="this.value=''" onfocusout="if (this.value === '') { this.value = this.defaultValue; }" autocomplete="off" />
            </td>
        </tr>
        <tr>
            <td colspan="3" align="center">
                <button class="nanohome" style="width: 30%; background-color: #c0fcb1;" onclick="multiswitch('add')">💾</button>
                <button class="nanohome" style="width: 30%; background-color: #fff4bd;" onclick="multiswitch('show all')">🔎</button>
                <button class="nanohome" style="width: 30%; background-color: #ffbdbd;" onclick="multiswitch('remove')">❌</button>
            </td>
        </tr>
    </table>
</div>

<script>
    function multiswitch(param) {
        var multi_dev1 = document.getElementById("multi_dev1").value;
        var multi_dev2 = document.getElementById("multi_dev2").value;
        var multi_value1 = document.getElementById("multi_value1").value;
        var multi_value2 = document.getElementById("multi_value2").value;
        var multi_day = document.getElementById("multi_day").value;
        var multi_on = document.getElementById("multi_on").value;
        var multi_off = document.getElementById("multi_off").value;

        var multiswitch_message = "multiswitch " + param + " '" + multi_dev1 + "' '" + multi_dev2 + "' '" + multi_value1 + "' '" + multi_value2 + "' '" + multi_day + "' '" + multi_on + "' '" + multi_off + "'";

        publish_timer(multiswitch_message);

    }

    function show_time() {
      
        var multi_day = document.getElementById("multi_day");

        if (multi_day.value !== "always") {
          
            document.getElementById("multi_on").value = "08:00";
            document.getElementById("multi_off").value = "22:00";
            
        } else {
          
            document.getElementById("multi_on").value = "-";
            document.getElementById("multi_off").value = "-";
            
        }
    }
</script>
