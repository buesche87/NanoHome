<div><h5>Wifi hinzufügen / ändern</h5></div>

<div id="mqtt_wcon_panel">

<hr>

<table style="width:100%">
  <tbody>
  <tr>
  <td style="width:120px">SSID</td>
  <td><input type="text" id="ssid" name="ssid" style="width:100%" requiredminlength="4" /></td>
  </tr>
  <tr>
  <td>PSK</td>
  <td><input type="text" id="psk" name="psk" style="width:100%" requiredminlength="8" /></td>
  </tr>
  <tr>
  <td>IP</td>
  <td><input type="text" list="iplist" id="ipaddress" name="ipaddress" style="width:100%" requiredminlength="4" />
  <datalist id="iplist">
  <option>DHCP</option>
  <option>Custom...</option>
  </datalist>
  </td>
  </tr>
  <tr>
  <td>Subnetz</td>
  <td><input type="text" list="subnetlist" id="subnetinp" name="subnetinp" style="width:100%" maxlength="2" />
  <datalist id="subnetlist">
  <option>24</option>
  <option>8</option>
  <option>16</option>
  <option>32</option>
  <option>Custom...</option>
  </datalist>
  </td>
  </tr>
  <tr>
  <td /><td><center>
  <button style="background-color: #adfc95" type="button" onclick="message_wcon();">
    <font size="4">Senden</font>
  </button></center></td>
  </tr>
  </tbody>
  </table>
</div>

<script>

    var message_wcon = function () {
        var ssid_input = document.getElementById("ssid").value;
        var psk_input = document.getElementById("psk").value;
        var ip_adresse = document.getElementById("ipaddress").value;
        var subnetmask = document.getElementById("subnetinp").value;
        var wcon = "wcon '" + ssid_input + "' '" + psk_input + "' '" + ip_adresse + "' '" + subnetmask + "'";

        publish_settings(wcon);

    }

</script>
